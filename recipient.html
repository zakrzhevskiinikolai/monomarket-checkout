<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F4F4F4" />
    <title>Отримувач · monoМаркет</title>
    <link rel="stylesheet" href="styles.css?v=4" />
  </head>
  <body>
    <div class="app" id="app"></div>

    <script src="app.js?v=4"></script>
    <script>
      function avatarBlock(r) {
        if (r.avatar === "photo") {
          return `<img src="assets/icons/recipient_mykola.png" alt="">`;
        }
        return `<span>${r.initials || ""}</span>`;
      }

      function render() {
        document.getElementById("app").innerHTML = `
          ${statusBar()}
          <div class="header-back">
            <button class="header-back__btn" data-action="back">${ICONS.arrow_back}</button>
          </div>

          <h1 class="app-title" style="padding:0 16px;margin-bottom:16px">Отримувач</h1>

          <div class="content">
            ${state.recipients.map(r => `
              <div class="list-card" data-pick="${r.id}" data-active="${r.id === state.selectedRecipientId}">
                <div class="list-card__avatar list-card__avatar--${r.avatar}">
                  ${avatarBlock(r)}
                </div>
                <div class="list-card__main">
                  <p class="list-card__name">${r.name}</p>
                  <p class="list-card__sub">${r.phone}</p>
                </div>
              </div>`).join("")}

            <div class="list-card" id="addBtn">
              <div class="list-card__avatar list-card__avatar--add">+</div>
              <div class="list-card__main">
                <p class="list-card__name">Додати нового отримувача</p>
              </div>
            </div>
          </div>
          <div class="home-indicator"></div>
        `;
      }

      document.addEventListener("click", (e) => {
        const pick = e.target.closest("[data-pick]");
        if (pick) {
          state.selectedRecipientId = pick.getAttribute("data-pick");
          saveState(state);
          location.href = "checkout.html";
        }
        if (e.target.closest("#addBtn")) toast("У прототипі: форма додавання отримувача");
      });

      render();
    </script>
  </body>
</html>
