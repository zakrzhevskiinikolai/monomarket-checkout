<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#5A4DD0" />
    <title>Замовлення оформлено · monoМаркет</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app app--success" id="app"></div>

    <script src="app.js"></script>
    <script>
      // mono-style cat with laptop, drawn in SVG
      const monoCat = `
        <svg viewBox="0 0 320 280" width="100%" xmlns="http://www.w3.org/2000/svg">
          <!-- ears -->
          <path d="M85 90 L100 35 L135 80 Z" fill="#fff" stroke="#16171C" stroke-width="3" stroke-linejoin="round"/>
          <path d="M235 90 L220 35 L185 80 Z" fill="#fff" stroke="#16171C" stroke-width="3" stroke-linejoin="round"/>
          <!-- inner ears -->
          <path d="M105 65 L113 50 L125 70 Z" fill="#F4D8E5"/>
          <path d="M215 65 L207 50 L195 70 Z" fill="#F4D8E5"/>
          <!-- head -->
          <ellipse cx="160" cy="125" rx="92" ry="78" fill="#fff" stroke="#16171C" stroke-width="3"/>
          <!-- glasses -->
          <ellipse cx="125" cy="125" rx="28" ry="26" fill="#fff" stroke="#16171C" stroke-width="3"/>
          <ellipse cx="195" cy="125" rx="28" ry="26" fill="#fff" stroke="#16171C" stroke-width="3"/>
          <line x1="153" y1="125" x2="167" y2="125" stroke="#16171C" stroke-width="3" stroke-linecap="round"/>
          <!-- eyes -->
          <ellipse cx="125" cy="125" rx="9" ry="11" fill="#16171C"/>
          <ellipse cx="195" cy="125" rx="9" ry="11" fill="#16171C"/>
          <circle cx="128" cy="121" r="2.5" fill="#fff"/>
          <circle cx="198" cy="121" r="2.5" fill="#fff"/>
          <!-- nose -->
          <path d="M155 155 Q160 162 165 155" stroke="#16171C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <!-- mouth -->
          <path d="M147 165 Q160 178 173 165" stroke="#16171C" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- whiskers -->
          <line x1="80" y1="150" x2="105" y2="153" stroke="#16171C" stroke-width="2" stroke-linecap="round"/>
          <line x1="80" y1="160" x2="105" y2="160" stroke="#16171C" stroke-width="2" stroke-linecap="round"/>
          <line x1="240" y1="150" x2="215" y2="153" stroke="#16171C" stroke-width="2" stroke-linecap="round"/>
          <line x1="240" y1="160" x2="215" y2="160" stroke="#16171C" stroke-width="2" stroke-linecap="round"/>

          <!-- arms holding laptop -->
          <path d="M75 195 Q85 175 110 180" fill="none" stroke="#16171C" stroke-width="3" stroke-linecap="round"/>
          <path d="M245 195 Q235 175 210 180" fill="none" stroke="#16171C" stroke-width="3" stroke-linecap="round"/>

          <!-- laptop -->
          <rect x="58" y="190" width="204" height="80" rx="6" fill="#fff" stroke="#16171C" stroke-width="3"/>
          <rect x="68" y="200" width="184" height="60" rx="3" fill="#F2F3F5"/>
          <circle cx="160" cy="230" r="22" fill="#16171C"/>
          <text x="160" y="240" font-size="28" font-weight="900" fill="#fff" text-anchor="middle" font-family="-apple-system, sans-serif">m</text>
          <rect x="50" y="265" width="220" height="8" rx="3" fill="#16171C"/>
        </svg>`;

      function render() {
        const sel = selectedProducts();
        const total = cartTotal();
        const count = sel.length;

        document.getElementById("app").innerHTML = `
          ${statusBar(true)}

          <div class="success-content">
            <div class="success-illustration">${monoCat}</div>

            <div class="success-bubble">Вітаю з покупкою!</div>

            <p class="success-sub">Очікуйте повідомлення про відправку вашого замовлення</p>

            <div class="success-card">
              <div class="success-card__row">
                <div class="success-card__main">
                  <p class="success-card__count">${count} ${plural(count, "товар", "товари", "товарів")}</p>
                  <p class="success-card__sum">${fmt(total)}</p>
                </div>
                <div class="success-card__thumbs">
                  ${sel
                    .slice(0, 2)
                    .map((p) => `<div class="summary-card__thumb">${productImage(p.image)}</div>`)
                    .join("")}
                </div>
              </div>
              <button class="btn btn--ghost" id="viewOrderBtn">Переглянути замовлення</button>
            </div>
          </div>

          <div class="success-bottom">
            <button class="btn btn--black" id="homeBtn">Повернутися на головну</button>
          </div>
        `;
      }

      function plural(n, one, few, many) {
        const mod10 = n % 10;
        const mod100 = n % 100;
        if (mod10 === 1 && mod100 !== 11) return one;
        if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return few;
        return many;
      }

      document.addEventListener("click", (e) => {
        if (e.target.closest("#homeBtn")) {
          // reset cart selection on "home"
          state.products.forEach((p) => (p.selected = false));
          // re-pick the showcase pair so cart isn't empty next time
          const ps5 = state.products.find((p) => p.id === "ps5");
          const iph = state.products.find((p) => p.id === "iphone17");
          if (ps5) ps5.selected = false;
          if (iph) iph.selected = true;
          saveState(state);
          location.href = "index.html";
        }
        if (e.target.closest("#viewOrderBtn")) {
          toast("У прототипі: деталі замовлення");
        }
      });

      render();
    </script>
  </body>
</html>
