<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#5A4DD0" />
    <title>Замовлення оформлено · monoМаркет</title>
    <link rel="stylesheet" href="styles.css?v=11" />
  </head>
  <body>
    <div class="app app--success" id="app"></div>

    <script src="app.js?v=11"></script>
    <script>
      function render() {
        const sel = selectedProducts();
        const total = cartTotal();
        const count = sel.length || 2;
        const totalSafe = total || 35198;
        const thumbs = sel.length ? sel : [
          state.products.find(p => p.id==="asus-tuf"),
          state.products.find(p => p.id==="mx-master"),
        ].filter(Boolean);

        document.getElementById("app").innerHTML = `
          ${statusBar()}

          <div class="success-content">
            <img class="success-cat" src="assets/illustrations/cat.png" alt="">
            <div class="success-bubble">Вітаю з покупкою!</div>
            <p class="success-sub">Очікуйте повідомлення про відправку<br>вашого замовлення</p>

            <div class="success-card">
              <div class="success-card__top">
                <div class="success-card__main">
                  <p class="success-card__count">${count} ${plural(count,"товар","товари","товарів")}</p>
                  <p class="success-card__sum">${fmtSum(totalSafe)}</p>
                </div>
                <div class="success-card__thumbs">
                  ${thumbs.slice(0,2).map(p => `<div class="success-card__thumb"><img src="${p.image}" alt=""></div>`).join("")}
                </div>
              </div>
              <button class="btn btn--ghost" id="viewOrderBtn">Переглянути замовлення</button>
            </div>
          </div>

          <div class="success-bottom">
            <button class="btn btn--black" id="homeBtn">Повернутися на головну</button>
          </div>
          <div class="home-indicator"></div>
        `;
      }

      document.addEventListener("click", (e) => {
        if (e.target.closest("#homeBtn")) {
          // reset to a fresh cart state
          state.products.forEach(p => (p.selected = false));
          const iph = state.products.find(p => p.id === "iphone17");
          if (iph) iph.selected = true;
          saveState(state);
          location.href = "index.html";
        }
        if (e.target.closest("#viewOrderBtn")) toast("У прототипі: деталі замовлення");
      });

      render();
    </script>
  </body>
</html>
