<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F4F4F4" />
    <title>Кошик · monoМаркет</title>
    <link rel="stylesheet" href="styles.css?v=13" />
  </head>
  <body>
    <div class="app" id="app"></div>

    <script src="app.js?v=13"></script>
    <script>
      const CHECK_SVG = `<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1.5 4.5L4 7L9.5 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

      function productCardHTML(p) {
        const subtotal = p.price * p.qty;
        const discount = p.oldPrice ? Math.round((1 - p.price / p.oldPrice) * 100) : 0;
        return `
          <div class="product-card" data-card="${p.id}">
            <button class="check" data-checked="${p.selected}" data-toggle="${p.id}">${CHECK_SVG}</button>
            <h3 class="product-card__name">${p.name}</h3>
            <div class="product-card__seller">
              <img class="product-card__seller-avatar" src="${p.sellerAvatar}" alt="">
              <span>${p.seller}</span>
            </div>
            <div class="product-card__price-row">
              <span class="product-card__price" data-price="${p.id}">${fmtSum(subtotal)}</span>
              ${p.oldPrice ? `<span class="product-card__discount">-${discount}%</span>` : ""}
              ${p.oldPrice ? `<span class="product-card__old-price">${fmtNumber(p.oldPrice * p.qty)}</span>` : ""}
            </div>
            <div class="product-card__media">
              <div class="product-card__image"><img src="${p.image}" alt=""></div>
              <div class="stepper">
                <button class="stepper__btn ${p.qty <= 1 ? "stepper__btn--remove" : ""}" data-step="-" data-id="${p.id}">
                  ${p.qty <= 1 ? ICONS.delete : ICONS.minus}
                </button>
                <span class="stepper__count">${p.qty}</span>
                <button class="stepper__btn" data-step="+" data-id="${p.id}">${ICONS.plus}</button>
              </div>
            </div>
          </div>`;
      }

      function renderShell() {
        document.getElementById("app").innerHTML = `
          ${statusBar()}
          <div style="padding-top:8px"></div>
          <h1 class="app-title">
            <span>Ваш кошик</span>
            <button class="app-title__share">${ICONS.share}</button>
          </h1>

          <div class="content">
            <div class="limit-banner">
              <span class="limit-banner__paw">${ICONS.paw}</span>
              <span class="limit-banner__text">Ліміт на покупку частинами</span>
              <span class="limit-banner__sum">120 000 ₴</span>
            </div>
            <div id="products"></div>
            <div id="emptyState" style="display:none;text-align:center;padding:40px 16px;color:var(--text-secondary);font-size:15px;">
              Кошик порожній
            </div>
          </div>

          <div class="cart-footer">
            <div class="cart-footer__sum-row">
              <button class="check" id="toggleAll">${CHECK_SVG}</button>
              <div class="cart-footer__sum-text">
                <p class="cart-footer__sum-title">Вибрати всі</p>
                <p class="cart-footer__sum-sub" id="subText"></p>
              </div>
              <div class="cart-footer__sum-amount" id="totalAmount"></div>
            </div>
            <button class="btn cart-footer__btn" id="continueBtn">Продовжити</button>
            ${tabbar("cart")}
          </div>
          <div class="home-indicator"></div>
        `;

        document.getElementById("products").innerHTML = state.products.map(productCardHTML).join("");
        updateBottom();
      }

      function updateBottom() {
        const totalSel = selectedItemCount();
        const all = state.products.length > 0 && totalSel === state.products.length;
        const total = cartTotal();
        document.getElementById("toggleAll").dataset.checked = all;
        document.getElementById("subText").textContent =
          totalSel > 0 ? `Обрано ${totalSel} ${plural(totalSel, "товар", "товари", "товарів")}` : "Жодного товару";
        document.getElementById("totalAmount").textContent = fmtSum(total);
        const cont = document.getElementById("continueBtn");
        cont.disabled = totalSel === 0;
        document.getElementById("emptyState").style.display = state.products.length === 0 ? "block" : "none";
        // tabbar badge
        const badge = document.querySelector(".tabbar__badge");
        const cnt = selectedQtyCount();
        const cartItem = document.querySelectorAll(".tabbar__icon")[2]; // 3rd item = Кошик
        if (cnt > 0) {
          if (!badge) {
            const span = document.createElement("span");
            span.className = "tabbar__badge";
            span.textContent = cnt;
            cartItem.appendChild(span);
          } else {
            badge.textContent = cnt;
          }
        } else if (badge) {
          badge.remove();
        }
      }

      function toggleProduct(id) {
        const p = state.products.find((x) => x.id === id);
        p.selected = !p.selected;
        saveState(state);
        document.querySelector(`[data-toggle="${id}"]`).dataset.checked = p.selected;
        updateBottom();
      }

      function changeQty(id, delta) {
        const p = state.products.find((x) => x.id === id);
        if (delta > 0) {
          p.qty += 1;
        } else {
          if (p.qty > 1) p.qty -= 1;
          else { return removeProduct(id); }
        }
        saveState(state);
        const card = document.querySelector(`[data-card="${id}"]`);
        card.querySelector(".stepper__count").textContent = p.qty;
        card.querySelector(`[data-price="${id}"]`).textContent = fmtSum(p.price * p.qty);
        const oldPriceEl = card.querySelector(".product-card__old-price");
        if (oldPriceEl && p.oldPrice) oldPriceEl.textContent = fmtNumber(p.oldPrice * p.qty);
        const minus = card.querySelector('[data-step="-"]');
        minus.classList.toggle("stepper__btn--remove", p.qty <= 1);
        minus.innerHTML = p.qty <= 1 ? ICONS.delete : ICONS.minus;
        updateBottom();
      }

      function removeProduct(id) {
        const card = document.querySelector(`[data-card="${id}"]`);
        const h = card.offsetHeight;
        card.style.height = h + "px";
        // force reflow
        card.getBoundingClientRect();
        card.classList.add("is-removing");
        card.style.height = "0px";
        card.style.marginBottom = "0px";
        card.style.paddingTop = "0px";
        card.style.paddingBottom = "0px";
        state.products = state.products.filter((p) => p.id !== id);
        saveState(state);
        setTimeout(() => {
          card.remove();
          updateBottom();
        }, 260);
      }

      function toggleAll() {
        const all = state.products.length > 0 && state.products.every((p) => p.selected);
        state.products.forEach((p) => (p.selected = !all));
        saveState(state);
        // update each checkbox
        state.products.forEach((p) => {
          const el = document.querySelector(`[data-toggle="${p.id}"]`);
          if (el) el.dataset.checked = p.selected;
        });
        updateBottom();
      }

      document.addEventListener("click", (e) => {
        const toggle = e.target.closest("[data-toggle]");
        if (toggle) return toggleProduct(toggle.getAttribute("data-toggle"));
        if (e.target.closest("#toggleAll")) return toggleAll();
        const step = e.target.closest("[data-step]");
        if (step) return changeQty(step.getAttribute("data-id"), step.getAttribute("data-step") === "+" ? 1 : -1);
        const cont = e.target.closest("#continueBtn");
        if (cont && !cont.disabled) location.href = "checkout.html";
      });

      renderShell();
    </script>
  </body>
</html>
