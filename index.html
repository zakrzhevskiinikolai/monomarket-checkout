<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F2F3F5" />
    <title>Кошик · monoМаркет</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app" id="app"></div>

    <script src="app.js"></script>
    <script>
      function render() {
        const products = state.products;
        const totalSelected = selectedProducts().length;
        const totalQty = selectedCount();
        const total = cartTotal();
        const allSelected = totalSelected === products.length && products.length > 0;

        document.getElementById("app").innerHTML = `
          ${statusBar()}
          <div class="header header--big">
            <h1 class="header__title-big">
              <span>Ваш кошик</span>
              <button class="header__share">${ICONS.share}</button>
            </h1>
          </div>

          <div class="content">
            <div class="limit-banner">
              <span class="limit-banner__paw">${ICONS.paw.replace('width="22"', 'width="22"')}</span>
              <span class="limit-banner__text">Ліміт на покупку частинами</span>
              <span class="limit-banner__sum">120 000 ₴</span>
            </div>

            ${products
              .map(
                (p) => `
              <div class="product-card">
                <button class="check" data-checked="${p.selected}" data-toggle="${p.id}"></button>
                <div class="product-card__main">
                  <h3 class="product-card__name">${p.name}</h3>
                  <div class="product-card__seller">
                    <span class="product-card__seller-emoji ${p.sellerEmoji === "ktc" ? "product-card__seller-emoji--ktc" : ""}">${p.sellerEmoji === "ktc" ? "KTC" : p.sellerEmoji}</span>
                    <span>${p.seller}</span>
                  </div>
                  <div class="product-card__price-row">
                    <span class="product-card__price">${fmt(p.price)}</span>
                    ${p.oldPrice ? `<span class="product-card__discount">-${Math.round((1 - p.price / p.oldPrice) * 100)}%</span>` : ""}
                    ${p.oldPrice ? `<span class="product-card__old-price">${fmt(p.oldPrice).replace(" ₴", "")}</span>` : ""}
                  </div>
                </div>
                <div class="product-card__media">
                  <div class="product-card__image">${productImage(p.image)}</div>
                  <div class="stepper">
                    <button class="stepper__btn ${p.qty <= 1 ? "stepper__btn--remove" : ""}" data-step="-" data-id="${p.id}">
                      ${p.qty <= 1 ? ICONS.trash : "−"}
                    </button>
                    <span class="stepper__count">${p.qty}</span>
                    <button class="stepper__btn" data-step="+" data-id="${p.id}">+</button>
                  </div>
                </div>
              </div>
            `
              )
              .join("")}
          </div>

          <div class="bottom-bar">
            <div class="bottom-summary">
              <button class="check" data-checked="${allSelected}" data-toggle-all="1"></button>
              <div class="bottom-summary__main">
                <p class="bottom-summary__title">Вибрати всі</p>
                <p class="bottom-summary__sub">${totalSelected > 0 ? `Обрано ${totalSelected} ${plural(totalSelected, "товар", "товари", "товарів")}` : "Жодного товару"}</p>
              </div>
              <div class="bottom-summary__sum">${fmt(total)}</div>
            </div>
            <button class="btn" id="continueBtn" ${totalSelected === 0 ? "disabled" : ""}>Продовжити</button>
          </div>

          ${tabBar("cart")}
        `;
      }

      function plural(n, one, few, many) {
        const mod10 = n % 10;
        const mod100 = n % 100;
        if (mod10 === 1 && mod100 !== 11) return one;
        if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return few;
        return many;
      }

      document.addEventListener("click", (e) => {
        const toggle = e.target.closest("[data-toggle]");
        if (toggle) {
          const id = toggle.getAttribute("data-toggle");
          const p = state.products.find((x) => x.id === id);
          if (p) {
            p.selected = !p.selected;
            saveState(state);
            render();
          }
          return;
        }

        const all = e.target.closest("[data-toggle-all]");
        if (all) {
          const allSelected = state.products.every((p) => p.selected);
          state.products.forEach((p) => (p.selected = !allSelected));
          saveState(state);
          render();
          return;
        }

        const step = e.target.closest("[data-step]");
        if (step) {
          const id = step.getAttribute("data-id");
          const dir = step.getAttribute("data-step");
          const p = state.products.find((x) => x.id === id);
          if (!p) return;
          if (dir === "+") p.qty += 1;
          else {
            if (p.qty > 1) p.qty -= 1;
            else {
              // remove via trash → just unselect & qty stays 1
              p.selected = false;
              toast(`${p.name.split(" ").slice(0, 2).join(" ")}… знято з замовлення`);
            }
          }
          saveState(state);
          render();
          return;
        }

        const cont = e.target.closest("#continueBtn");
        if (cont && !cont.disabled) {
          location.href = "checkout.html";
        }
      });

      render();
    </script>
  </body>
</html>
