<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F4F4F4" />
    <title>Кошик · monoМаркет</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app" id="app"></div>

    <script src="app.js"></script>
    <script>
      function render() {
        const products = state.products;
        const totalSelected = selectedItemCount();
        const total = cartTotal();
        const allSelected = totalSelected === products.length && products.length > 0;

        const productHTML = products.map((p) => {
          const discount = p.oldPrice ? Math.round((1 - p.price / p.oldPrice) * 100) : 0;
          return `
            <div class="product-card">
              <button class="check" data-checked="${p.selected}" data-toggle="${p.id}"></button>

              <h3 class="product-card__name">${p.name}</h3>

              <div class="product-card__seller">
                <img class="product-card__seller-avatar" src="${p.sellerAvatar}" alt="">
                <span>${p.seller}</span>
              </div>

              <div class="product-card__price-row">
                <span class="product-card__price">${fmtSum(p.price)}</span>
                ${p.oldPrice ? `<span class="product-card__discount">-${discount}%</span>` : ""}
                ${p.oldPrice ? `<span class="product-card__old-price">${fmtNumber(p.oldPrice)}</span>` : ""}
              </div>

              <div class="product-card__media">
                <div class="product-card__image"><img src="${p.image}" alt=""></div>
                <div class="stepper">
                  <button class="stepper__btn ${p.qty <= 1 ? "stepper__btn--remove" : ""}" data-step="-" data-id="${p.id}">
                    ${p.qty <= 1 ? ICONS.delete : ICONS.minus}
                  </button>
                  <span class="stepper__count">${p.qty}</span>
                  <button class="stepper__btn" data-step="+" data-id="${p.id}">${ICONS.plus}</button>
                </div>
              </div>
            </div>`;
        }).join("");

        document.getElementById("app").innerHTML = `
          ${statusBar()}
          <div style="padding-top:8px"></div>
          <h1 class="app-title">
            <span>Ваш кошик</span>
            <button class="app-title__share">${ICONS.share}</button>
          </h1>

          <div class="content">
            <div class="limit-banner">
              <span class="limit-banner__paw">${ICONS.paw}</span>
              <span class="limit-banner__text">Ліміт на покупку частинами</span>
              <span class="limit-banner__sum">120 000 ₴</span>
            </div>
            ${productHTML}
          </div>

          <div class="cart-bottom">
            <div class="cart-bottom__card">
              <div class="cart-bottom__sum-row">
                <button class="check" data-checked="${allSelected}" data-toggle-all="1"></button>
                <div class="cart-bottom__sum-text">
                  <p class="cart-bottom__sum-title">Вибрати всі</p>
                  <p class="cart-bottom__sum-sub">${totalSelected > 0 ? `Обрано ${totalSelected} ${plural(totalSelected, "товар", "товари", "товарів")}` : "Жодного товару"}</p>
                </div>
                <div class="cart-bottom__sum-amount">${fmtSum(total)}</div>
              </div>
              <button class="btn cart-bottom__btn" id="continueBtn" ${totalSelected === 0 ? "disabled" : ""}>Продовжити</button>
            </div>
          </div>

          ${tabbar("cart")}
          <div class="home-indicator"></div>
        `;
      }

      document.addEventListener("click", (e) => {
        const toggle = e.target.closest("[data-toggle]");
        if (toggle) {
          const id = toggle.getAttribute("data-toggle");
          const p = state.products.find((x) => x.id === id);
          if (p) { p.selected = !p.selected; saveState(state); render(); }
          return;
        }
        if (e.target.closest("[data-toggle-all]")) {
          const all = state.products.every((p) => p.selected);
          state.products.forEach((p) => (p.selected = !all));
          saveState(state); render();
          return;
        }
        const step = e.target.closest("[data-step]");
        if (step) {
          const id = step.getAttribute("data-id");
          const dir = step.getAttribute("data-step");
          const p = state.products.find((x) => x.id === id);
          if (!p) return;
          if (dir === "+") p.qty += 1;
          else {
            if (p.qty > 1) p.qty -= 1;
            else { p.selected = false; toast("Знято з замовлення"); }
          }
          saveState(state); render();
          return;
        }
        const cont = e.target.closest("#continueBtn");
        if (cont && !cont.disabled) location.href = "checkout.html";
      });

      render();
    </script>
  </body>
</html>
