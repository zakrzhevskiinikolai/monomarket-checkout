<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F4F4F4" />
    <title>Адреса доставки · monoМаркет</title>
    <link rel="stylesheet" href="styles.css?v=8" />
  </head>
  <body>
    <div class="app" id="app"></div>

    <script src="app.js?v=8"></script>
    <script>
      function addressCard(a) {
        return `
          <div class="addr-card" data-pick="${a.id}" data-active="${a.id === state.selectedAddressId}">
            <div class="addr-card__icon"><img src="assets/icons/address_icon_40.png" alt=""></div>
            <div class="addr-card__main">
              <p class="addr-card__title">${a.street}${a.apt ? ', ' + a.apt : ''}</p>
              <p class="addr-card__sub">${a.city}</p>
            </div>
          </div>`;
      }

      function render() {
        document.getElementById("app").innerHTML = `
          ${statusBar()}
          <div class="header-back">
            <button class="header-back__btn" data-action="back">${ICONS.arrow_back}</button>
          </div>

          <h1 class="app-title" style="padding:0 16px;margin-bottom:24px">Адреса доставки</h1>

          <div class="content">
            ${state.addresses.map(addressCard).join("")}

            <div class="addr-card addr-card--add" id="addBtn">
              <img src="assets/icons/plus_circle.svg" alt="" class="addr-card__plus">
              <span class="addr-card__add-text">Додати нову адресу</span>
            </div>
            <div style="height:24px"></div>
          </div>
          <div class="home-indicator"></div>
        `;
      }

      document.addEventListener("click", (e) => {
        const pick = e.target.closest("[data-pick]");
        if (pick) {
          state.selectedAddressId = pick.getAttribute("data-pick");
          state.delivery = "courier";
          saveState(state);
          location.href = "checkout.html";
        }
        if (e.target.closest("#addBtn")) toast("У прототипі: форма додавання адреси");
      });

      render();
    </script>
  </body>
</html>
