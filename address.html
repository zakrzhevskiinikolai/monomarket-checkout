<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F4F4F4" />
    <title>Адреса доставки · monoМаркет</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app" id="app"></div>

    <script src="app.js"></script>
    <script>
      function render() {
        document.getElementById("app").innerHTML = `
          ${statusBar()}
          <div class="header-back">
            <button class="header-back__btn" data-action="back">${ICONS.arrow_back}</button>
          </div>

          <h1 class="app-title" style="padding:0 16px;margin-bottom:16px">Адреса доставки</h1>

          <div class="content">
            ${state.addresses.map(a => `
              <div class="list-card" data-pick="${a.id}" data-active="${a.id === state.selectedAddressId}">
                <div class="list-card__avatar" style="background:var(--bg-blue-soft);color:var(--blue);">
                  <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
                    <path d="M11 19C11 19 17 13.5 17 9C17 5.7 14.3 3 11 3C7.7 3 5 5.7 5 9C5 13.5 11 19 11 19Z" stroke="currentColor" stroke-width="1.7"/>
                    <circle cx="11" cy="9" r="2.3" stroke="currentColor" stroke-width="1.7"/>
                  </svg>
                </div>
                <div class="list-card__main">
                  <p class="list-card__name">${a.street}</p>
                  <p class="list-card__sub">${a.city} · ${a.note}</p>
                </div>
                <div class="chevron-blue">${ICONS.chevron_right}</div>
              </div>`).join("")}

            <div class="list-card" id="addBtn">
              <div class="list-card__avatar list-card__avatar--add">+</div>
              <div class="list-card__main">
                <p class="list-card__name">Додати нову адресу</p>
              </div>
            </div>
          </div>
          <div class="home-indicator"></div>
        `;
      }

      document.addEventListener("click", (e) => {
        const pick = e.target.closest("[data-pick]");
        if (pick) {
          state.selectedAddressId = pick.getAttribute("data-pick");
          state.delivery = "courier";
          saveState(state);
          location.href = "checkout.html";
        }
        if (e.target.closest("#addBtn")) toast("У прототипі: форма додавання адреси");
      });

      render();
    </script>
  </body>
</html>
