<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#3395FF" />
    <title>Чекаут · monoМаркет</title>
    <link rel="stylesheet" href="styles.css?v=12" />
  </head>
  <body>
    <div class="app app--blue-header" id="app"></div>

    <script src="app.js?v=12"></script>
    <script>
      function render() {
        // preserve scroll position to avoid jump on tab toggle
        const prevScroll = document.getElementById("checkoutScroll");
        const savedContentScroll = prevScroll ? prevScroll.scrollTop : 0;
        const sheetWasOpen = document.getElementById("sheet")?.dataset.open === "true";

        const sel = selectedProducts();
        if (sel.length === 0) { location.href = "index.html"; return; }
        const total = cartTotal();
        const isParts = state.payment === "parts";
        const isCourier = state.delivery === "courier";
        const addr = getSelectedAddress();
        const dep = getSelectedDepartment();
        const recip = getSelectedRecipient();

        const ctaText = isParts
          ? `Сплатити частинами: ${fmtSum(firstInstallment())}`
          : "Продовжити";

        const recipAvatar = recip.avatar === "photo"
          ? `<img src="assets/icons/recipient_avatar_32.png" alt="">`
          : `<span>${recip.initials || ""}</span>`;

        document.getElementById("app").innerHTML = `
          <div class="checkout-bg" id="checkoutBg"></div>
          <div class="checkout-nav">
            ${statusBar()}
            <div class="blue-header__nav">
              <button class="blue-header__back" data-action="back">${ICONS.arrow_back}</button>
              <h1 class="blue-header__title">Ваше замовлення</h1>
            </div>
          </div>

          <div class="checkout-scroll" id="checkoutScroll">
            <div class="checkout-scroll__spacer"></div>

          <div class="summary-card">
            <div class="summary-card__icon"><img src="assets/icons/cart_white.svg" alt="" style="width:10px;height:10px"></div>
            <h2 class="summary-card__title">Кошик</h2>
            <a href="index.html" class="summary-card__edit">
              <img src="assets/icons/edit_pencil.svg" alt="" style="width:12px;height:12px">
              Редагувати
            </a>
            <p class="summary-card__sub">${sel.length} ${plural(sel.length, "товар", "товари", "товарів")}</p>
            <div class="summary-card__sum">${fmtSum(total)}</div>
            <div class="summary-card__thumbs">
              ${sel.slice(0,2).map(p => `<div class="summary-card__thumb"><img src="${p.image}" alt=""></div>`).join("")}
            </div>
          </div>

          <div class="content checkout-content" style="padding-top:16px">

            <div class="section">
              <p class="section-label">Оплата</p>
              <div class="card">
                <div class="segmented">
                  <div class="segmented__opt" data-active="${isParts}" data-pay="parts">Частинами</div>
                  <div class="segmented__opt" data-active="${!isParts}" data-pay="full">Повністю</div>
                </div>
                ${isParts
                  ? sel.map(p => `
                    <div class="install-row">
                      <div class="install-row__paw"><img src="assets/icons/paw_install_32.svg" alt=""></div>
                      <div class="install-row__main">
                        <p class="install-row__name">${p.name.length > 25 ? p.name.slice(0,25)+'…' : p.name}</p>
                        <div class="install-row__sum">
                          ${fmtSum(Math.round((p.price * p.qty) / p.installments))}
                          <span class="x">×</span>${p.installments} ${plural(p.installments,"платіж","платежі","платежів")}
                        </div>
                      </div>
                      <div class="install-row__chevron"><img src="assets/icons/chevron_right.svg" alt="" style="width:20px;height:20px"></div>
                    </div>`).join("")
                  : `
                    <div class="payment-row">
                      <div class="payment-row__icon">
                        <img src="assets/icons/payment_card_mono.png" alt="" style="width:32px;height:32px;display:block">
                      </div>
                      <div class="payment-row__main">
                        <p class="payment-row__title">Оплата карткою mono</p>
                        <p class="payment-row__sub">З чорної або білої картки</p>
                      </div>
                    </div>
                  `}
              </div>
            </div>

            <div class="section">
              <p class="section-label">Доставка</p>
              <div class="card">
                <div class="segmented">
                  <div class="segmented__opt" data-active="${!isCourier}" data-del="department">Відділення</div>
                  <div class="segmented__opt" data-active="${isCourier}" data-del="courier">Кур'єр</div>
                </div>
                <div class="delivery-row" id="deliveryRow">
                  <div class="np-icon-img"><img src="assets/icons/np_round_32.png" alt=""></div>
                  <div class="delivery-row__main">
                    ${isCourier
                      ? `<p class="delivery-row__title">${addr.street}${addr.apt ? ', ' + addr.apt : ''}</p><p class="delivery-row__sub">${addr.city}</p>`
                      : `<p class="delivery-row__title">${dep.city}, Відділення №${dep.number}</p><p class="delivery-row__sub">${dep.street}</p>`}
                  </div>
                  <div class="chevron-blue"><img src="assets/icons/chevron_right.svg" alt="" style="width:20px;height:20px"></div>
                </div>
                ${isCourier ? `<div class="delivery-note">🤝 ${addr.note || "Безкоштовно у квартиру"}</div>` : ""}
              </div>
            </div>

            <div class="section">
              <p class="section-label">Отримувач</p>
              <div class="card recipient-row" id="recipRow">
                <div class="avatar avatar--${recip.avatar}">${recipAvatar}</div>
                <div class="recipient-row__main">
                  <p class="recipient-row__name">${recip.name}</p>
                  <p class="recipient-row__phone">${recip.phone}</p>
                </div>
                <div class="chevron-blue"><img src="assets/icons/chevron_right.svg" alt="" style="width:20px;height:20px"></div>
              </div>
            </div>

            ${isParts ? `
              <div class="checkout-disclaimer">
                <span class="checkout-disclaimer__icon"><img src="assets/icons/info_filled.svg" alt="" style="width:16px;height:16px"></span>
                <span>Сплачуючи частинами, ви підписуєте <b>паспорти кредитів</b> для всіх товарів</span>
              </div>` : ""}

            <div style="height:24px"></div>
          </div>
          </div>

          <div class="cta-area">
            <button class="btn" id="ctaBtn">${ctaText}</button>
          </div>

          <div class="home-indicator"></div>

          <div class="sheet-backdrop" id="backdrop"></div>
          <div class="sheet" id="sheet">
            <div class="sheet__handle"></div>
            <div class="sheet__head">
              <h2 class="sheet__title">Підтвердіть оплату</h2>
              <button class="sheet__close" data-sheet="close">Згорнути</button>
            </div>

            ${["black","white"].map(c => {
              const data = c === "black"
                ? { name: "Чорна картка", balance: "50 450.25 ₴", img: "assets/icons/card_black_mc.png" }
                : { name: "Біла картка", balance: "29 191.87 ₴", img: "assets/icons/card_white_visa.png" };
              const checked = state.card === c;
              return `
                <div class="card-option" data-card="${c}">
                  <div class="card-option__art"><img src="${data.img}" alt=""></div>
                  <div class="card-option__main">
                    <p class="card-option__name">${data.name}</p>
                    <p class="card-option__balance">${data.balance}</p>
                  </div>
                  <img class="card-option__radio" src="assets/icons/${checked ? 'radio_on' : 'radio_off'}.svg" alt="">
                </div>`;
            }).join("")}

            <div class="sheet-info">
              <img src="assets/icons/info_grey.svg" alt="" style="width:16px;height:16px">
              <span>Зведена платіжна інструкція оплати</span>
            </div>
            <button class="btn" id="paySheetBtn">Сплатити повністю: ${fmtSum(total)}</button>
          </div>
        `;

        // wire up scroll listener — shrink gradient bg as user scrolls
        const scrollEl = document.getElementById("checkoutScroll");
        const bgEl = document.getElementById("checkoutBg");
        if (scrollEl && bgEl) {
          const BG_FULL = 160;
          const BG_SHRUNK = 96;
          const RANGE = BG_FULL - BG_SHRUNK; // 64px
          function onScroll() {
            const t = Math.min(1, Math.max(0, scrollEl.scrollTop / RANGE));
            bgEl.style.height = (BG_FULL - RANGE * t) + "px";
          }
          scrollEl.addEventListener("scroll", onScroll, { passive: true });
          scrollEl.scrollTop = savedContentScroll;
          onScroll();
        }
        if (sheetWasOpen) openSheet();
      }

      function openSheet() {
        document.getElementById("backdrop").dataset.open = "true";
        document.getElementById("sheet").dataset.open = "true";
      }
      function closeSheet() {
        document.getElementById("backdrop").dataset.open = "false";
        document.getElementById("sheet").dataset.open = "false";
      }

      document.addEventListener("click", (e) => {
        const pay = e.target.closest("[data-pay]");
        if (pay) { state.payment = pay.getAttribute("data-pay"); saveState(state); render(); return; }
        const del = e.target.closest("[data-del]");
        if (del) { state.delivery = del.getAttribute("data-del"); saveState(state); render(); return; }
        if (e.target.closest("#deliveryRow")) {
          location.href = state.delivery === "courier" ? "address.html" : "delivery.html"; return;
        }
        if (e.target.closest("#recipRow")) { location.href = "recipient.html"; return; }
        if (e.target.closest("#ctaBtn")) {
          if (state.payment === "parts") {
            location.href = "success.html";
          } else {
            openSheet();
          }
          return;
        }
        if (e.target.closest('[data-sheet="close"]')) { closeSheet(); return; }
        const back = e.target.closest("#backdrop");
        if (back && back.dataset.open === "true") { closeSheet(); return; }
        const cardOpt = e.target.closest("[data-card]");
        if (cardOpt) {
          const picked = cardOpt.getAttribute("data-card");
          state.card = picked;
          saveState(state);
          // targeted update of radio icons — no re-render, no flicker
          document.querySelectorAll(".card-option").forEach((opt) => {
            const oC = opt.getAttribute("data-card");
            const radio = opt.querySelector(".card-option__radio");
            if (radio) radio.src = `assets/icons/${oC === picked ? "radio_on" : "radio_off"}.svg`;
          });
          return;
        }
        if (e.target.closest("#paySheetBtn")) { location.href = "success.html"; return; }
      });

      render();
    </script>
  </body>
</html>
