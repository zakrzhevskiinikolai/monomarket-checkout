<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1F70F5" />
    <title>Чекаут · monoМаркет</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app app--blue" id="app"></div>

    <script src="app.js"></script>
    <script>
      function render() {
        const sel = selectedProducts();
        if (sel.length === 0) {
          location.href = "index.html";
          return;
        }
        const total = cartTotal();
        const isParts = state.payment === "parts";
        const isCourier = state.delivery === "courier";
        const addr = getSelectedAddress();
        const dep = getSelectedDepartment();
        const recip = getSelectedRecipient();

        const ctaText = isParts ? `Сплатити частинами: ${fmt(firstInstallment())}` : "Продовжити";

        document.getElementById("app").innerHTML = `
          ${statusBar(true)}
          ${backHeader({ title: "Ваше замовлення", white: true })}

          <div class="content">
            <div class="summary-card">
              <div class="summary-card__icon">${ICONS.cart}</div>
              <div class="summary-card__main">
                <div class="summary-card__row1">
                  <h2 class="summary-card__title">Кошик</h2>
                  <a href="index.html" class="summary-card__edit">${ICONS.pencil} Редагувати</a>
                </div>
                <p class="summary-card__sub">${sel.length} ${plural(sel.length, "товар", "товари", "товарів")}</p>
                <div class="summary-card__sum">${fmt(total)}</div>
              </div>
              <div class="summary-card__thumbs">
                ${sel
                  .slice(0, 2)
                  .map((p) => `<div class="summary-card__thumb">${productImage(p.image)}</div>`)
                  .join("")}
              </div>
            </div>

            <div class="section">
              <p class="section-label">Оплата</p>
              <div class="card">
                <div class="segmented">
                  <div class="segmented__opt" data-active="${isParts}" data-pay="parts">Частинами</div>
                  <div class="segmented__opt" data-active="${!isParts}" data-pay="full">Повністю</div>
                </div>

                ${
                  isParts
                    ? sel
                        .map(
                          (p) => `
                  <div class="installment-row">
                    <div class="installment-row__paw">${ICONS.paw}</div>
                    <div class="installment-row__main">
                      <p class="installment-row__name">${p.name.replace(/(.{20}).+/, "$1...")}</p>
                      <div class="installment-row__sum">
                        <b>${fmt(Math.round((p.price * p.qty) / p.installments))}</b>
                        <span class="x">×</span>
                        <span>${p.installments} ${plural(p.installments, "платіж", "платежі", "платежів")}</span>
                      </div>
                    </div>
                    <div class="installment-row__chevron">${ICONS.chevron}</div>
                  </div>
                `
                        )
                        .join("")
                    : `
                  <div class="payment-row">
                    <div class="payment-row__icon">${ICONS.card}</div>
                    <div class="payment-row__main">
                      <p class="payment-row__title">Оплата карткою mono</p>
                      <p class="payment-row__sub">З чорної або білої картки</p>
                    </div>
                  </div>
                `
                }
              </div>
            </div>

            <div class="section">
              <p class="section-label">Доставка</p>
              <div class="card">
                <div class="segmented">
                  <div class="segmented__opt" data-active="${!isCourier}" data-del="department">Відділення</div>
                  <div class="segmented__opt" data-active="${isCourier}" data-del="courier">Кур'єр</div>
                </div>

                <div class="address-row" id="deliveryRow">
                  <div class="np-icon">${ICONS.np}</div>
                  <div class="address-row__main">
                    ${
                      isCourier
                        ? `<p class="address-row__title">${addr.street}</p><p class="address-row__sub">${addr.city}</p>`
                        : `<p class="address-row__title">${dep.city}, Відділення №${dep.number}</p><p class="address-row__sub">${dep.street}</p>`
                    }
                  </div>
                  <div class="address-row__chevron">${ICONS.chevron}</div>
                </div>

                ${
                  isCourier
                    ? `<div class="delivery-note">🤝 ${addr.note || "Безкоштовно у квартиру"}</div>`
                    : ""
                }
              </div>
            </div>

            <div class="section">
              <p class="section-label">Отримувач</p>
              <div class="card recipient-row" id="recipRow">
                <div class="avatar avatar--${recip.avatar}">${recip.avatar === "photo" ? "👤" : recip.initials || ""}</div>
                <div class="recipient-row__main">
                  <p class="recipient-row__name">${recip.name}</p>
                  <p class="recipient-row__phone">${recip.phone}</p>
                </div>
                <div class="address-row__chevron">${ICONS.chevron}</div>
              </div>
            </div>

            ${
              isParts
                ? `<div class="checkout-disclaimer">
                ${ICONS.info}
                <span>Сплачуючи частинами, ви підписуєте <b>паспорти кредитів</b> для всіх товарів</span>
              </div>`
                : ""
            }
          </div>

          <div class="bottom-bar">
            <button class="btn" id="ctaBtn">${ctaText}</button>
          </div>

          <!-- card picker sheet -->
          <div class="sheet-backdrop" id="backdrop"></div>
          <div class="sheet" id="sheet">
            <div class="sheet__handle"></div>
            <div class="sheet__head">
              <h2 class="sheet__title">Підтвердіть оплату</h2>
              <button class="sheet__close" data-sheet="close">Згорнути</button>
            </div>

            ${["black", "white"]
              .map((c) => {
                const card = c === "black"
                  ? { name: "Чорна картка", balance: "50 450.25 ₴" }
                  : { name: "Біла картка", balance: "29 191.87 ₴" };
                return `
              <div class="card-option" data-card="${c}">
                <div class="card-option__art card-option__art--${c}">
                  <span class="card-option__art-currency">₴</span>
                  <span class="card-option__art-mark">${c === "black" ? "<span style='color:#EB001B'>●</span><span style='color:#F79E1B;margin-left:-3px'>●</span>" : "VISA"}</span>
                </div>
                <div class="card-option__main">
                  <p class="card-option__name">${card.name}</p>
                  <p class="card-option__balance">${card.balance}</p>
                </div>
                <div class="radio" data-checked="${state.card === c}"></div>
              </div>`;
              })
              .join("")}

            <div class="sheet-info">
              ${ICONS.info}
              <span>Зведена платіжна інструкція оплати</span>
            </div>

            <button class="btn" id="paySheetBtn">Сплатити повністю: ${fmt(total)}</button>
          </div>
        `;
      }

      function plural(n, one, few, many) {
        const mod10 = n % 10;
        const mod100 = n % 100;
        if (mod10 === 1 && mod100 !== 11) return one;
        if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return few;
        return many;
      }

      function openSheet() {
        document.getElementById("backdrop").dataset.open = "true";
        document.getElementById("sheet").dataset.open = "true";
      }

      function closeSheet() {
        document.getElementById("backdrop").dataset.open = "false";
        document.getElementById("sheet").dataset.open = "false";
      }

      function showProcessing() {
        const overlay = document.createElement("div");
        overlay.className = "processing-overlay";
        overlay.innerHTML = `
          <div class="processing-spinner">
            <div class="spinner"></div>
            <div class="processing-spinner__text">Обробка платежу...</div>
          </div>`;
        document.body.appendChild(overlay);
        requestAnimationFrame(() => (overlay.dataset.open = "true"));
        setTimeout(() => {
          location.href = "success.html";
        }, 1400);
      }

      document.addEventListener("click", (e) => {
        const pay = e.target.closest("[data-pay]");
        if (pay) {
          state.payment = pay.getAttribute("data-pay");
          saveState(state);
          render();
          return;
        }
        const del = e.target.closest("[data-del]");
        if (del) {
          state.delivery = del.getAttribute("data-del");
          saveState(state);
          render();
          return;
        }
        const drow = e.target.closest("#deliveryRow");
        if (drow) {
          location.href = state.delivery === "courier" ? "address.html" : "delivery.html";
          return;
        }
        const rrow = e.target.closest("#recipRow");
        if (rrow) {
          location.href = "recipient.html";
          return;
        }
        const cta = e.target.closest("#ctaBtn");
        if (cta) {
          if (state.payment === "parts") {
            showProcessing();
          } else {
            openSheet();
          }
          return;
        }
        const sheetClose = e.target.closest('[data-sheet="close"]');
        if (sheetClose) {
          closeSheet();
          return;
        }
        const back = e.target.closest("#backdrop");
        if (back && back.dataset.open === "true") {
          closeSheet();
          return;
        }
        const cardOpt = e.target.closest("[data-card]");
        if (cardOpt) {
          state.card = cardOpt.getAttribute("data-card");
          saveState(state);
          render();
          openSheet();
          return;
        }
        const paySheet = e.target.closest("#paySheetBtn");
        if (paySheet) {
          closeSheet();
          showProcessing();
          return;
        }
      });

      render();
    </script>
  </body>
</html>
