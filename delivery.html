<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FFFFFF" />
    <title>Відділення Нової пошти · monoМаркет</title>
    <link rel="stylesheet" href="styles.css?v=11" />
    <style>.app{background:#fff}</style>
  </head>
  <body>
    <div class="app" id="app"></div>

    <script src="app.js?v=11"></script>
    <script>
      const DEPT_ICONS = {
        box: "assets/icons/dep_box.png",
        truck: "assets/icons/dep_truck.png",
        postmat: "assets/icons/dep_postmat.png",
      };

      function render(query = "") {
        const q = query.trim().toLowerCase();
        const filt = (d) => !q || d.number.includes(q) || d.street.toLowerCase().includes(q) || d.city.toLowerCase().includes(q);
        const recent = state.departments.filter((d) => d.recent && filt(d));
        const others = state.departments.filter((d) => !d.recent && filt(d));
        const city = state.departments[0]?.city || "м. Київ";

        document.getElementById("app").innerHTML = `
          ${statusBar()}
          <div class="header-back">
            <button class="header-back__btn" data-action="back">${ICONS.arrow_back}</button>
          </div>

          <h1 class="app-title" style="padding:0 16px">
            <span style="display:flex;align-items:center;gap:10px;">
              Доставка Нова пошта
              <img src="assets/icons/np_round_24.png" alt="" style="width:24px;height:24px;display:block">
            </span>
          </h1>

          <a class="subtitle-link" href="#" id="cityChange">${city}<img src="assets/icons/edit_pencil.svg" alt="" style="width:14px;height:14px;display:inline-block;vertical-align:middle"></a>

          <div class="search">
            ${ICONS.search}
            <input class="search__input" id="searchInput" placeholder="Адреса або номер відділення" value="${query.replace(/"/g, '&quot;')}">
          </div>

          <div class="content content--no-pad">
            ${recent.length ? `
              <div class="dl-section">
                <div class="dl-section__label">Останні</div>
                <div class="dl-list">
                  ${recent.map(deliveryItem).join("")}
                </div>
              </div>` : ""}
            ${others.length ? `
              <div class="dl-section">
                <div class="dl-section__label">Доступні</div>
                <div class="dl-list">
                  ${others.map(deliveryItem).join("")}
                </div>
              </div>` : ""}
            ${(!recent.length && !others.length) ? `<p style="text-align:center;padding:40px 0;color:var(--text-secondary)">Нічого не знайдено</p>` : ""}
            <div style="height:24px"></div>
          </div>
          <div class="home-indicator"></div>
        `;

        // restore focus
        const inp = document.getElementById("searchInput");
        if (inp && document.activeElement !== inp && query) {
          inp.focus();
          inp.setSelectionRange(query.length, query.length);
        }
      }

      function deliveryItem(d) {
        const title = d.isPostmat ? `Поштомат №${d.number}` : `Відділення №${d.number}`;
        return `
          <div class="dl-item" data-pick="${d.id}">
            <div class="dl-item__icon"><img src="${DEPT_ICONS[d.icon]}" alt=""></div>
            <div class="dl-item__body">
              <div class="dl-item__top">
                <span class="dl-item__title">${title}</span>
                <span class="dl-item__weight">${d.weight}</span>
              </div>
              <p class="dl-item__addr">${d.street}</p>
            </div>
          </div>`;
      }

      document.addEventListener("input", (e) => {
        if (e.target.id === "searchInput") render(e.target.value);
      });

      document.addEventListener("click", (e) => {
        const pick = e.target.closest("[data-pick]");
        if (pick) {
          state.selectedDepartmentId = pick.getAttribute("data-pick");
          state.delivery = "department";
          saveState(state);
          location.href = "checkout.html";
        }
        if (e.target.closest("#cityChange")) { e.preventDefault(); toast("У прототипі: вибір міста"); }
      });

      render();
    </script>
  </body>
</html>
